name: SprintToolBox

on:
  push:
    branches: [ main, master, pre_m ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, pre_m ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: brew install wxwidgets curl

      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PWD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          file "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "==> Identities available after import:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build package
        env:
          SIGN_ID: "${{ startsWith(github.ref, 'refs/tags/v') && 'Developer ID Application: Dariusz Kalita (AWQLMYJKHR)' || '' }}"
        run: ./package_mac.sh

      - name: Notarize
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
          NOTARIZE_PWD: ${{ secrets.NOTARIZE_PASSWORD }}
        run: |
          DMG=$(ls dist/mac/*.dmg)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARIZE_PWD" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SprintToolBox-macOS-arm64
          path: dist/mac/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-wxwidgets3.2-msw
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-nsis
      
      - name: Build package
        run: bash package_win.sh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SprintToolBox-Windows
          path: dist/win/*.exe
          retention-days: 30

  build-windows-arm64:
    runs-on: windows-11-arm
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-ninja
            mingw-w64-clang-aarch64-wxwidgets3.2-msw
            mingw-w64-clang-aarch64-curl
            mingw-w64-ucrt-x86_64-nsis

      - name: Build package
        env:
          ARCH: arm64
        run: bash package_win.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SprintToolBox-Windows-arm64
          path: dist/win/*.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libwxgtk3.2-dev \
            libcurl4-openssl-dev \
            dpkg-dev
      
      - name: Build package
        run: ./package_linux.sh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SprintToolBox-Linux
          path: dist/linux/*.deb
          retention-days: 30

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-windows-arm64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.deb
          draft: false
          prerelease: false
          generate_release_notes: true
